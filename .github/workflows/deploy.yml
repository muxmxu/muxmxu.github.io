name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SVC_DEMO_ENABLED: ${{ vars.SVC_DEMO_ENABLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Exclude disabled demo audio
        if: env.SVC_DEMO_ENABLED == 'false'
        run: mv public/demos/spatial-voice-conversion "$RUNNER_TEMP/"
      - name: Build Astro site
        uses: withastro/action@v6

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
